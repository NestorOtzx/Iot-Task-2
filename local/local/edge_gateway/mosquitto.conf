# Configuración del Edge Gateway Mosquitto (Broker Local de Campo)
listener 1883 0.0.0.0
allow_anonymous true

# === BRIDGE hacia el Broker Remoto (mqtt_remote) ===
connection bridge_to_remote
address mqtt_remote:1883

# Reenviar todos los tópicos de datos (sensores → remoto) y comandos (remoto → actuadores)
# "both" indica que los mensajes fluyen en ambas direcciones por el bridge
topic # both 1 "" ""

bridge_protocol_version mqttv311
cleansession true
clientid edge-gateway-bridge
start_type automatic
notifications false
keepalive_interval 60
